### default supported ROS message types:
# sensor_msgs/Imu
# geometry_msgs/Twist
# std_msgs/String
# (modify/add in ros_sub_pub.hpp if you need more)
### max number of send_topics supported: 50

### optional fixed startup demo of simulated node-level network fault
# node_fault_start_after: 5.0 # seconds after bridge startup
# node_fault_duration: 2.0 # fault duration in seconds

### optional remote control server for simulated node-level network fault
# control_enabled: true # disabled by default to avoid port conflicts on one host
# control_node_id: robot1 # optional logical node id used by trigger_fault.py --target
# control_bind_ip: '*' # usually '*' for WiFi LAN tests
# control_bind_port: 3999 # each bridge process on the same host needs a different port
# control_token: test-lab-token # optional shared token; empty means no token check

### list all <IPname: IP> here (IPname can be set arbitrarily) ###
IP:
  self: '*'   # '*' stands for all self IPs
  neighbor: 127.0.0.1 # modify to the IP of other machines

####### Send these ROS messages to remote robots #######
## if no send_topics needed, comment all these out
send_topics:
- topic_name: chatter # send the messages of this ROS topic
  msg_type: std_msgs/String # ROS message type (rosmsg style)
  max_freq: 1000 # max sending frequency (Hz) int
  # max_bitrate: 0 # optional max sending bitrate (bps). Omitted or 0 means unlimited.
  # fault_policy: buffer # optional simulated node-fault policy: drop, buffer, or latest.
  srcIP: self # self IP
  srcPort: 3001 # ports of send_topics should be different

####### receive these ROS messages from remote robots #######
## if no recv_topics needed, comment all these out
recv_topics:
- topic_name: chatter_recv # the received messages will be published in this topic
  msg_type: std_msgs/String # ROS message type (rosmsg style)
  # fault_policy: buffer # optional simulated node-fault policy: drop, buffer, or latest.
  srcIP: neighbor # message source IPname
  srcPort: 3001 # message source port
